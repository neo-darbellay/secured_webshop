<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Connexion</h1>
        </div>

        <div class="login-card">
          <form id="login-form" action="/api/auth/login" method="POST">
            <div class="form-group">
              <label for="email">Adresse email</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="ex: utilisateur@email.com"
              />
            </div>

            <div class="form-group">
              <label for="password">Mot de passe</label>
              <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="••••••••"
              />
            </div>

            <button type="submit" class="login-btn">Se connecter</button>

            <p class="register-link">
              Pas de compte ? <a href="/register">Créer un compte</a>
            </p>
          </form>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script src="/js/AuthManager.js"></script>
  </body>
</html>

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Inscription</title>
    <link rel="stylesheet" href="/css/main.css" />
    <style>
      .password-strength {
        margin-top: 0.75rem;
      }
      .password-strength-bar {
        width: 0%;
        height: 0.5rem;
        border-radius: 0.25rem;
        background-color: #777;
        transition:
          width 0.2s ease,
          background-color 0.2s ease;
      }
      .password-strength-text {
        margin: 0.5rem 0 0;
        font-size: 0.9rem;
        color: #444;
      }
    </style>
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Inscription</h1>
        </div>

        <div class="login-card">
          <form id="register-form" action="/api/auth/register" method="POST">
            <div id="error-message" style="color: red; display: none"></div>
            <div class="form-group">
              <label for="username">
                Nom d'utilisateur<span style="color: red">*</span>
              </label>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="ex: SuperBob33000"
              />
            </div>

            <div class="form-group">
              <label for="email">
                Adresse email<span style="color: red">*</span>
              </label>
              <input
                type="text"
                id="email"
                name="email"
                placeholder="ex: utilisateur@email.com"
              />
            </div>

            <div class="form-group">
              <label for="password">
                Mot de passe<span style="color: red">*</span>
              </label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
              />
              <div id="password-strength" class="password-strength">
                <div
                  id="password-strength-bar"
                  style="display: none"
                  class="password-strength-bar"
                ></div>
                <p
                  id="password-strength-text"
                  style="display: none"
                  class="password-strength-text"
                >
                  Force du mot de passe : rien saisi
                </p>
              </div>
            </div>

            <div class="form-group">
              <label for="location">Adresse</label>
              <input
                type="text"
                id="location"
                name="location"
                placeholder="ex: 123 Rue de la Paix, 75000 Paris"
              />
            </div>

            <div class="form-group">
              <label for="image">Image de profil</label>
              <input type="file" id="image" name="image" accept="image/*" />
            </div>

            <button type="submit" class="login-btn">S'inscrire</button>

            <p class="register-link">
              Déjà un compte ? <a href="/login">Se connecter</a>
            </p>
          </form>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script src="/js/AuthManager.js"></script>
  </body>
</html>
